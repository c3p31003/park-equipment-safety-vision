<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
        <title>遊具管理システム | 遊具異常撮影ページ</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/destyle.css@1.0.15/destyle.css"/>
        <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
        <style>
            /* メッセージ表示用のスタイル */
            .message {
                padding: 1rem;
                margin: 1rem 0;
                border-radius: 0.5rem;
                text-align: center;
                font-weight: 600;
                display: none;
                animation: slideIn 0.3s ease-out;
            }

            .message.success {
                background-color: #d4edda;
                color: #155724;
                border: 1px solid #c3e6cb;
                display: block;
            }

            .message.error {
                background-color: #f8d7da;
                color: #721c24;
                border: 1px solid #f5c6cb;
                display: block;
            }

            @keyframes slideIn {
                from {
                    opacity: 0;
                    transform: translateY(-10px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
        </style>
    </head>
    <body>
        <header>
            <div class="header_title"><a href="index.html"><h1>遊具管理システム</h1></a></div>
            <div class="alert"></div>
            <div class="openbtn"><span></span><span></span><span></span></div>
        </header>
        <div class="wrapper" id="TakePhoto">
            <!-- 戻るボタン -->
            <button id="backButton">
                <img class="BackButton" src="{{ url_for('static', filename='img/back.png') }}" alt="アイコン">
                <p>戻る</p>
            </button>
            <br>

            <!-- メッセージ表示エリア -->
            <div id="message" class="message"></div>

            <!-- カメラ表示エリア -->
            <div>
                <video id="cameraStream" style="width: 100%; max-width: 500px;"></video>
            </div>

            <!-- Canvas: 画像キャプチャ用（非表示） -->
            <canvas id="captureCanvas"></canvas>

            <!-- 撮影ボタン -->
            <div class="PhotoButton" id="photoButtonContainer">
                <img class="BackButton" src="{{ url_for('static', filename='img/PhotoButton.png') }}" alt="撮影ボタン">
            </div>

            <!-- 再撮影・保存ボタン -->
            <div class="NewButtons" id="newButtonsContainer" style="display: none;">
                <button id="retakeButton">
                    再撮影
                    <img class="BackButton" src="{{ url_for('static', filename='img/CameraIcon.png') }}" alt="アイコン">
                </button>               
                <button id="saveButton">
                    <img class="BackButton" src="{{ url_for('static', filename='img/PhotoButton.png') }}" alt="保存ボタン">
                </button>
            </div>
        </div>
        <footer></footer>

        <script>
            // ====================================================
            // 【グローバル変数】
            // ====================================================
            let capturedImage = null;  // Base64 画像データ
            let isLoading = false;     // 送信中かどうか
            let stream = null;         // カメラストリーム

            // URL パラメータから inspection_id を取得
            const inspectionId = new URLSearchParams(window.location.search).get('inspection_id') || 1;

            console.log('✅ inspection_id:', inspectionId);

            // ====================================================
            // 【DOM 要素の取得】
            // ====================================================
            const videoElement = document.getElementById('cameraStream');
            const canvasElement = document.getElementById('captureCanvas');
            const photoButtonContainer = document.getElementById('photoButtonContainer');
            const newButtonsContainer = document.getElementById('newButtonsContainer');
            const retakeButton = document.getElementById('retakeButton');
            const saveButton = document.getElementById('saveButton');
            const backButton = document.getElementById('backButton');
            const messageElement = document.getElementById('message');

            // ====================================================
            // 【1】ページロード時にカメラを自動起動
            // ====================================================
            function startCamera() {
                const constraints = {
                    video: {
                        facingMode: {
                            ideal: "environment"  // スマホなら背面カメラ
                        }
                    }
                };

                navigator.mediaDevices.getUserMedia(constraints)
                    .then(function(mediaStream) {
                        console.log('✅ カメラ起動成功');
                        stream = mediaStream;
                        videoElement.srcObject = stream;
                        videoElement.play();
                    })
                    .catch(function(err) {
                        console.error("❌ カメラ起動エラー: " + err);
                        showMessage('カメラの起動に失敗しました', 'error');
                    });
            }

            // ページ読み込み時にカメラを起動
            document.addEventListener('DOMContentLoaded', startCamera);

            // ====================================================
            // 【2】撮影ボタン（.PhotoButton）をクリック時の処理
            // ====================================================
            photoButtonContainer.addEventListener('click', capturePhoto);

            function capturePhoto() {
                console.log('📷 撮影ボタンクリック');

                // Canvas のコンテキスト（描画ツール）を取得
                const ctx = canvasElement.getContext('2d');
                
                // Canvas のサイズを video と同じにする
                canvasElement.width = videoElement.videoWidth;
                canvasElement.height = videoElement.videoHeight;
                
                // video の「今このフレーム」を canvas に描画
                ctx.drawImage(videoElement, 0, 0);
                
                // Base64 文字列に変換（後で送信用）
                capturedImage = canvasElement.toDataURL('image/png');

                console.log('✅ 写真をキャプチャしました');
                console.log('📊 画像サイズ:', capturedImage.length, 'bytes');
                
                // UI を切り替える（撮影ボタン非表示 → 再撮影・保存ボタン表示）
                photoButtonContainer.style.display = 'none';
                newButtonsContainer.style.display = 'flex';
            }

            // ====================================================
            // 【3】再撮影ボタン（#retakeButton）をクリック時の処理
            // ====================================================
            retakeButton.addEventListener('click', retakePhoto);

            function retakePhoto() {
                console.log('🔄 再撮影ボタンクリック');

                // キャプチャをリセット
                capturedImage = null;

                // UI を元に戻す（撮影ボタン表示 → 再撮影・保存ボタン非表示）
                photoButtonContainer.style.display = 'block';
                newButtonsContainer.style.display = 'none';

                // メッセージをクリア
                hideMessage();
            }

            // ====================================================
            // 【4】保存ボタン（#saveButton）をクリック時の処理 ✅ 新規追加
            // ====================================================
            saveButton.addEventListener('click', submitPhoto);

            async function submitPhoto() {
                console.log('💾 保存ボタンクリック');

                // チェック
                if (!capturedImage) {
                    showMessage('写真が見つかりません。もう一度撮影してください。', 'error');
                    return;
                }

                if (isLoading) {
                    console.log('⏳ 既に送信中です');
                    return;
                }

                // UI 更新（送信中）
                saveButton.disabled = true;
                isLoading = true;
                showMessage('送信中...', 'error');

                try {
                    // Backend API エンドポイント
                    const apiUrl = `/api/inspection/${inspectionId}/upload_photo`;
                    console.log('🔗 API URL:', apiUrl);

                    // POST リクエストを送信
                    const response = await fetch(apiUrl, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            photo_data: capturedImage,
                            filename: `inspection_${inspectionId}_${new Date().toISOString().slice(0, 10)}.png`
                        })
                    });

                    console.log('📡 レスポンスステータス:', response.status);

                    if (!response.ok) {
                        const errorData = await response.json();
                        throw new Error(errorData.error || `Server error: ${response.status}`);
                    }

                    const result = await response.json();
                    console.log('✅ 送信成功！', result);

                    // 成功メッセージを表示
                    showMessage(`✓ 写真を保存しました！ (ID: ${result.inspection_id})`, 'success');

                    // 2秒後に UI をリセット
                    setTimeout(function () {
                        console.log('🔄 UI をリセット');
                        capturedImage = null;
                        photoButtonContainer.style.display = 'block';
                        newButtonsContainer.style.display = 'none';
                        hideMessage();

                        // オプション：自動で前のページに戻る
                        // window.history.back();
                    }, 2000);

                } catch (error) {
                    console.error('❌ 送信エラー:', error);
                    showMessage(`✗ 送信失敗: ${error.message}`, 'error');
                
                } finally {
                    // UI 更新（送信完了）
                    saveButton.disabled = false;
                    isLoading = false;
                }
            }

            // ====================================================
            // 【5】ユーティリティ関数
            // ====================================================
            function showMessage(msg, type) {
                messageElement.textContent = msg;
                messageElement.className = `message ${type}`;
            }

            function hideMessage() {
                messageElement.textContent = '';
                messageElement.className = 'message';
            }

            // ====================================================
            // 【6】戻るボタンの処理
            // ====================================================
            backButton.addEventListener('click', function () {
                console.log('← 戻るボタンクリック');
                stopCamera();
                window.history.back();
            });

            // ====================================================
            // 【7】カメラを停止する関数
            // ====================================================
            function stopCamera() {
                console.log('⏹️ カメラを停止');
                if (stream) {
                    stream.getTracks().forEach(track => track.stop());
                    stream = null;
                }
            }

            // ====================================================
            // 【8】ページ離脱時にカメラを停止
            // ====================================================
            window.addEventListener('beforeunload', stopCamera);
            document.addEventListener('visibilitychange', function () {
                if (document.hidden) {
                    stopCamera();
                }
            });
        </script>

        <script src="{{ url_for('static', filename='js/JS.js') }}"></script>
    </body>
</html>
